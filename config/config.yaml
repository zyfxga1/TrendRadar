# ========== 基础设置（请勿修改） ==========
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ========== 核心运行配置（已按要求设置） ==========
model: incremental  # 增量模式，有新内容立即推
cron: "*/3 * * * *"  # 每3分钟抓取一次（你要求的频率）

# ========== 平台配置（仅开启微博） ==========
platforms:
  - id: weibo
    name: 微博

# ========== 博主监控（已填入你的2个博主UID） ==========
monitor_users:
  enable: true  # 开启定向监控
  user_list:
    - uid: 1799425301  # 你的第一个博主
      name: "博主A"
    - uid: 3837048407  # 你的第二个博主
      name: "博主B"

# ========== 过滤规则（已关闭，确保发啥都推） ==========
filter:
  enable: false  # 关键设置：关闭过滤，不筛关键词
  keywords: []   # 关键词留空

# ========== 钉钉推送（已开启） ==========
dingtalk:
  enable: true  # 开启钉钉推送
